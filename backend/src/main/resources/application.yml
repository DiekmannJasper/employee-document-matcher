spring:
  application:
    name: employee-document-matcher
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:10MB}
      max-request-size: ${UPLOAD_MAX_FILE_SIZE:10MB}
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/document_matcher}
    username: ${DATABASE_USERNAME:document_matcher}
    password: ${DATABASE_PASSWORD:document_matcher}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

app:
  storage:
    local-path: ${STORAGE_LOCAL_PATH:./data/documents}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

server:
  error:
    include-message: never
    include-stacktrace: never
